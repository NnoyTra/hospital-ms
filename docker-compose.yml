services:
  #MYSQL
  mysql-db:
    image: mysql:8.4
    container_name: mysql-container
    ports:
      - 3307:3306
    environment:
      MYSQL_ROOT_PASSWORD: mypass
      MYSQL_DATABASE: hospital
    volumes:
      - mysql-volume:/var/lib/mysql
    networks:
      - appNetwork
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pmypass"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  #NGINX
  nginx-app:
    image: nginx:alpine
    container_name: nginx-container
    ports:
      - 9090:80
    environment:
      MYSQL_ROOT_PASSWORD: mypass
      MYSQL_DATABASE: hospital
    networks:
      - appNetwork

  #REDIS
  redis-cache:
    image: redis:7-alpine
    container_name: redis-container
    ports:
      - 6379:6379
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-container:3306/hospital
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: mypass
    networks:
      - appNetwork
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  hospital-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: hospital-app:v01.01
    container_name: hospital-container
    ports:
      - 8081:8081
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-container:3306/hospital
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: mypass
      SPRING_REDIS_HOST: redis-container
      SPRING_REDIS_PORT: 6379
    depends_on:
      mysql-db:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
    networks:
      - appNetwork


networks:
  appNetwork:
    driver: bridge

volumes:
  mysql-volume: