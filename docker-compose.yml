services:
  #MYSQL
  mysql-db:
    image: mysql:8.4
    container_name: mysql-container
    ports:
      - 3307:3306
    environment:
      MYSQL_ROOT_PASSWORD: mypass
      MYSQL_DATABASE: hospital
    volumes:
      - mysql-volume:/var/lib/mysql
    networks:
      - appNetwork
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pmypass"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  #NGINX
  nginx-app:
    image: nginx:alpine
    container_name: nginx-container
    ports:
      - 9090:80
    environment:
      MYSQL_ROOT_PASSWORD: mypass
      MYSQL_DATABASE: hospital
    networks:
      - appNetwork

  #REDIS
  redis-cache:
    image: redis:7-alpine
    container_name: redis-container
    ports:
      - 6379:6379
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-container:3306/hospital
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: mypass
    networks:
      - appNetwork
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  #KAFKA
  kafka:
    image: apache/kafka:4.3.1
    container_name: kafka-container
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:9094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-container:9092,PLAINTEXT_HOST://localhost:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-container:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - appNetwork
    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1" ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  hospital-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: hospital-app:v01.01
    container_name: hospital-container
    ports:
      - 8081:8081
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-container:3306/hospital
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: mypass
      SPRING_REDIS_HOST: redis-container
      SPRING_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka-container:9092
    depends_on:
      mysql-db:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - appNetwork


networks:
  appNetwork:
    driver: bridge

volumes:
  mysql-volume: